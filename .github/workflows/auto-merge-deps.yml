name: Auto-merge Dependency PRs

# Läuft alle 4h, aligned auf 16:00 CEST (14 UTC) für Tagesübersicht und Patch-Release
on:
  schedule:
    - cron: '0 2,6,10,14,18,22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  merge-prs:
    name: Merge eligible dependency PRs
    runs-on: ubuntu-latest
    steps:
      - name: Process and merge PRs
        id: process
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os

          repo = os.environ['REPO']

          result = subprocess.run(
            ['gh', 'pr', 'list', '--repo', repo, '--state', 'open',
             '--json', 'number,title,labels,mergeable,statusCheckRollup', '--limit', '50'],
            capture_output=True, text=True, check=True
          )
          prs = json.loads(result.stdout)

          failed, merged = [], []

          for pr in prs:
            labels = {l['name'] for l in pr['labels']}

            # Nur Renovate/Dependabot-PRs
            if not (labels & {'renovate', 'dependencies'}):
              continue
            # Major-Updates niemals automatisch mergen
            if 'major-update' in labels:
              continue

            nr, title = pr['number'], pr['title']
            checks = pr['statusCheckRollup']

            if pr['mergeable'] != 'MERGEABLE':
              print(f'PR #{nr}: nicht mergeable ({pr["mergeable"]}), übersprungen')
              continue

            if any(c.get('conclusion') == 'FAILURE' or c.get('state') == 'FAILURE' for c in checks):
              print(f'PR #{nr}: CI-Fehler')
              failed.append(f'#{nr}: {title}')
              continue

            if any(c.get('status') in ('IN_PROGRESS', 'QUEUED') for c in checks):
              print(f'PR #{nr}: Checks laufen noch, übersprungen')
              continue

            print(f'Merge PR #{nr}: {title}')
            r = subprocess.run(
              ['gh', 'pr', 'merge', str(nr), '--repo', repo, '--merge', '--delete-branch'],
              capture_output=True, text=True
            )
            if r.returncode == 0:
              merged.append(f'#{nr}: {title}')
            else:
              print(f'Merge fehlgeschlagen: {r.stderr}')
              failed.append(f'#{nr}: {title} (merge-Fehler)')

          # Eindeutiger Delimiter verhindert Heredoc-Injection durch PR-Titel
          delim = 'AUTOMERGE_OUTPUT_FAILED_7f3b9a1d'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'failed_prs<<{delim}\n')
            f.write('\n'.join(failed) + '\n')
            f.write(f'{delim}\n')

          print(f'Gemergt: {len(merged)}, Fehlgeschlagen: {len(failed)}')
          PYEOF

      - name: Benachrichtigung bei CI-Fehlern
        if: steps.process.outputs.failed_prs != ''
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_BODY: ${{ steps.process.outputs.failed_prs }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          host = os.environ['SMTP_HOST']
          port = int(os.environ['SMTP_PORT'])
          user = os.environ['SMTP_USER']
          pwd  = os.environ['SMTP_PASSWORD']
          masked_user = user[:3] + '***' + user[user.rfind('@'):] if '@' in user else user[:3] + '***'
          print(f'SMTP-Diagnose: host={host} port={port} user={masked_user} pwd_len={len(pwd)}')

          body = (
            'Folgende Dependency-PRs haben fehlgeschlagene CI-Checks:\n\n'
            + os.environ['MAIL_BODY']
            + f'\n\nBitte prüfen: https://github.com/{os.environ["REPO"]}/pulls'
          )
          msg = MIMEText(body)
          msg['Subject'] = '[resulter] Dependency PR-Checks fehlgeschlagen'
          msg['From'] = f'resulter-bot <{user}>'
          msg['To'] = 'github@jobst-berlin.de'

          if port == 465:
            with smtplib.SMTP_SSL(host, port) as smtp:
              print(f'Verbunden (SSL), Server-Banner: {smtp.ehlo_resp}')
              smtp.login(user, pwd)
              smtp.send_message(msg)
          else:
            with smtplib.SMTP(host, port) as smtp:
              smtp.ehlo()
              print(f'Verbunden (STARTTLS), EHLO-Antwort: {smtp.ehlo_resp}')
              smtp.starttls()
              smtp.ehlo()
              smtp.login(user, pwd)
              smtp.send_message(msg)
          print('E-Mail gesendet.')
          PYEOF

  check-security:
    name: Prüfe offene Security-PRs
    runs-on: ubuntu-latest
    steps:
      - name: Security-PRs suchen
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os

          repo = os.environ['REPO']
          result = subprocess.run(
            ['gh', 'pr', 'list', '--repo', repo, '--state', 'open',
             '--label', 'security', '--json', 'number,title', '--limit', '50'],
            capture_output=True, text=True, check=True
          )
          prs = json.loads(result.stdout)

          # Eindeutiger Delimiter verhindert Heredoc-Injection durch PR-Titel
          delim = 'AUTOMERGE_OUTPUT_SECURITY_7f3b9a1d'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            if prs:
              lines = '\n'.join(f'- #{p["number"]}: {p["title"]}' for p in prs)
              f.write('found=true\n')
              f.write(f'prs<<{delim}\n{lines}\n{delim}\n')
            else:
              f.write('found=false\n')
          PYEOF

      - name: Benachrichtigung Security-PRs
        if: steps.find.outputs.found == 'true'
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_BODY: ${{ steps.find.outputs.prs }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          host = os.environ['SMTP_HOST']
          port = int(os.environ['SMTP_PORT'])
          user = os.environ['SMTP_USER']
          pwd  = os.environ['SMTP_PASSWORD']
          masked_user = user[:3] + '***' + user[user.rfind('@'):] if '@' in user else user[:3] + '***'
          print(f'SMTP-Diagnose: host={host} port={port} user={masked_user} pwd_len={len(pwd)}')

          body = (
            'Folgende Security-PRs warten auf Merge:\n\n'
            + os.environ['MAIL_BODY']
            + f'\n\nBitte sofort prüfen: https://github.com/{os.environ["REPO"]}/pulls?q=label%3Asecurity'
          )
          msg = MIMEText(body)
          msg['Subject'] = '[resulter] Offene Security-PRs!'
          msg['From'] = f'resulter-bot <{user}>'
          msg['To'] = 'github@jobst-berlin.de'

          if port == 465:
            with smtplib.SMTP_SSL(host, port) as smtp:
              print(f'Verbunden (SSL), Server-Banner: {smtp.ehlo_resp}')
              smtp.login(user, pwd)
              smtp.send_message(msg)
          else:
            with smtplib.SMTP(host, port) as smtp:
              smtp.ehlo()
              print(f'Verbunden (STARTTLS), EHLO-Antwort: {smtp.ehlo_resp}')
              smtp.starttls()
              smtp.ehlo()
              smtp.login(user, pwd)
              smtp.send_message(msg)
          print('E-Mail gesendet.')
          PYEOF

  daily-summary:
    name: Tägliche Dependency-Übersicht (16:00 Berlin)
    runs-on: ubuntu-latest
    steps:
      - name: Berliner Uhrzeit prüfen
        id: time
        run: |
          HOUR=$(TZ='Europe/Berlin' date +%H)
          echo "hour=$HOUR" >> $GITHUB_OUTPUT
          # 16 Uhr CEST (UTC+2) oder 15 Uhr CET (UTC+1)
          if [ "$HOUR" = "16" ] || [ "$HOUR" = "15" ]; then
            echo "send=true" >> $GITHUB_OUTPUT
          else
            echo "send=false" >> $GITHUB_OUTPUT
          fi

      - name: Pending-Approval-Einträge aus Dashboard lesen
        id: dashboard
        if: steps.time.outputs.send == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os, re

          repo = os.environ['REPO']
          result = subprocess.run(
            ['gh', 'issue', 'list', '--repo', repo, '--state', 'open',
             '--search', 'Dependency Dashboard', '--json', 'body', '--limit', '1'],
            capture_output=True, text=True, check=True
          )
          issues = json.loads(result.stdout)

          items = []
          if issues:
            body = issues[0]['body']
            section = re.search(r'## Pending Approval\n(.*?)(?=\n## |\Z)', body, re.DOTALL)
            if section:
              for line in section.group(1).split('\n'):
                m = re.search(r'- \[ \] <!--.*?-->(.*?)$', line)
                if m and '🔐' not in line:
                  items.append('- ' + m.group(1).strip())

          output = '\n'.join(items) if items else 'Keine Einträge'
          # Eindeutiger Delimiter verhindert Heredoc-Injection durch Dashboard-Inhalt
          delim = 'AUTOMERGE_OUTPUT_DASHBOARD_7f3b9a1d'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'items<<{delim}\n')
            f.write(output + '\n')
            f.write(f'{delim}\n')
          PYEOF

      - name: Tagesübersicht versenden
        if: steps.time.outputs.send == 'true'
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          PENDING_ITEMS: ${{ steps.dashboard.outputs.items }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          host = os.environ['SMTP_HOST']
          port = int(os.environ['SMTP_PORT'])
          user = os.environ['SMTP_USER']
          pwd  = os.environ['SMTP_PASSWORD']
          masked_user = user[:3] + '***' + user[user.rfind('@'):] if '@' in user else user[:3] + '***'
          print(f'SMTP-Diagnose: host={host} port={port} user={masked_user} pwd_len={len(pwd)}')

          repo = os.environ['REPO']
          body = (
            'Tägliche Dependency-Zusammenfassung — resulter\n\n'
            '== Ausstehende Freigaben (Pending Approval) ==\n'
            + os.environ['PENDING_ITEMS']
            + f'\n\nDashboard: https://github.com/{repo}/issues/309'
            + f'\nPRs:       https://github.com/{repo}/pulls'
          )
          msg = MIMEText(body)
          msg['Subject'] = '[resulter] Tägliche Dependency-Übersicht'
          msg['From'] = f'resulter-bot <{user}>'
          msg['To'] = 'github@jobst-berlin.de'

          if port == 465:
            with smtplib.SMTP_SSL(host, port) as smtp:
              print(f'Verbunden (SSL), Server-Banner: {smtp.ehlo_resp}')
              smtp.login(user, pwd)
              smtp.send_message(msg)
          else:
            with smtplib.SMTP(host, port) as smtp:
              smtp.ehlo()
              print(f'Verbunden (STARTTLS), EHLO-Antwort: {smtp.ehlo_resp}')
              smtp.starttls()
              smtp.ehlo()
              smtp.login(user, pwd)
              smtp.send_message(msg)
          print('E-Mail gesendet.')
          PYEOF

  release-patch:
    name: Patch-Release nach täglichen Dependency-Merges
    runs-on: macos-latest
    needs: merge-prs
    if: always()
    steps:
      - name: Berliner Uhrzeit prüfen
        id: time
        run: |
          HOUR=$((10#$(TZ='Europe/Berlin' date +%H)))
          # Ab 15 Uhr Berlin freigeben: GitHub verzögert Cron-Läufe oft um 30-90 min,
          # ein starres 15/16-Uhr-Fenster verpasst dann das Tagesrelease. Der
          # already-bumped-Guard stellt sicher, dass trotzdem nur 1x täglich released wird.
          if [ "$HOUR" -ge 15 ]; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

      - name: Heutige Dependency-Merges prüfen
        id: merges
        if: steps.time.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TODAY=$(TZ='Europe/Berlin' date +%Y-%m-%d)
          COUNT=$(gh pr list --repo "$REPO" --state merged \
            --search "merged:>=$TODAY" \
            --json number,labels --limit 100 \
            --jq '[.[] | select(.labels | map(.name) | (contains(["renovate"]) or contains(["dependencies"])))] | length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "has_merges=true" >> $GITHUB_OUTPUT
            echo "Heute $COUNT Dependency-PR(s) gemergt."
          else
            echo "has_merges=false" >> $GITHUB_OUTPUT
            echo "Keine Dependency-Merges heute — kein Release nötig."
          fi

      - name: Repository auschecken
        if: steps.merges.outputs.has_merges == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Git konfigurieren
        if: steps.merges.outputs.has_merges == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prüfe ob heute schon ein Version-Bump stattfand
        id: already-bumped
        if: steps.merges.outputs.has_merges == 'true'
        run: |
          TODAY=$(TZ='Europe/Berlin' date +%Y-%m-%d)
          BUMP=$(git log --oneline --after="$TODAY 00:00:00" --grep="feat: bump version" | head -1)
          if [ -n "$BUMP" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "Heute bereits gebumpt: $BUMP — übersprungen."
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Patch-Version erhöhen
        if: steps.merges.outputs.has_merges == 'true' && steps.already-bumped.outputs.bumped == 'false'
        run: ./bump-version.sh patch

      - name: Version-Bump auf main pushen
        if: steps.merges.outputs.has_merges == 'true' && steps.already-bumped.outputs.bumped == 'false'
        run: git push origin main

      - name: Release-Branch erstellen
        if: steps.merges.outputs.has_merges == 'true' && steps.already-bumped.outputs.bumped == 'false'
        run: ./create-release-branch.sh
