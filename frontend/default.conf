server {
    listen 80;
    server_name resulter.olberlin.de;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: script-src 'self' prevents XSS via external/inline scripts.
    # style-src requires 'unsafe-inline' because PrimeVue injects <style> tags at runtime.
    # img-src and font-src allow data: URIs for bundled base64 assets.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none';" always;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
