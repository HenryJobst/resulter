shellEmulator: true

trustPolicy: permissive

overrides:
  '@babel/core': '>=7.29.6'
  ajv@^6.0.0: ^6.14.0
  axios: ^1.13.5
  esbuild: '>=0.28.1'
  form-data: '>=4.0.6'
  shell-quote: '>=1.8.4'
  brace-expansion@^1.0.0: ^5.0.0
  brace-expansion@^2.0.0: ^5.0.0
  follow-redirects: ^1.16.0
  glob: '>=10.5.0'
  lodash: '>=4.18.1'
  minimatch@^10.0.0: 10.2.5
  minimatch@^3.0.0: 10.2.5
  minimatch@^5.0.0: 10.2.5
  minimatch@^9.0.0: 10.2.5
  picomatch@^2.0.0: 4.0.4
  picomatch@^4.0.0: 4.0.4
  qs: '>=6.15.2'
  rollup: '>=4.59.0'
  tmp: '>=0.2.7'
  yaml@^1.0.0: ^2.0.0
  yaml@^2.0.0: ^2.8.3

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - nx
  - simple-git-hooks
  - vue-demi

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  nx: true
  simple-git-hooks: true
  vue-demi: true

